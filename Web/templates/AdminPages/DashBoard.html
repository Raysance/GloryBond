<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理控制台</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary-color: #4f8ef7;
            --primary-hover: #3b7ddd;
            --text-color: #1e293b;
            --secondary-text: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p {
            color: var(--secondary-text);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: #ffffff;
            color: var(--text-color);
            border-color: var(--border-color);
        }

        .btn-outline:hover {
            background-color: var(--bg-color);
            border-color: #cbd5e1;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>管理控制台</h1>
        <p>请选择需要操作的任务</p>
        <div class="button-stack">
            <a href="/admin/funcs/direct-navigate" class="btn btn-primary">战绩查看</a>
            <a href="/admin/funcs/user-edit" class="btn btn-outline">用户编辑</a>
            <a href="/admin/funcs/chat-viewer" class="btn btn-outline">对话记录查询</a>
        </div>
    </div>
</body>
</html>
