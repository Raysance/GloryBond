    <script>
        const filename = '{{filename}}';
        let allBattles = [];
        let currentMapFilter = '全部';
        let profileData = null;
        let heroStats = [];
        let dateLabels = [];
        let dateLabelIndexMap = {};
        let dateRangeStartIndex = 0;
        let dateRangeEndIndex = 0;
        let dateFilterApplyTimer = null;
        const modalLinkTimers = new WeakMap();
        const battleCardLoadingTimers = new WeakMap();

        function setupBackButton() {
            const backBtn = document.getElementById('backFloatingBtn');
            if (!backBtn) return;
            const navigateBack = () => {
                if (backBtn.dataset.busy === 'true') return;
                backBtn.dataset.busy = 'true';
                backBtn.classList.add('loading');
                if (window.history.length > 1) window.history.back();
                else if (document.referrer) window.location.href = document.referrer;
                else window.location.href = '/';
                setTimeout(() => {
                    delete backBtn.dataset.busy;
                    backBtn.classList.remove('loading');
                }, 1200);
            };
            backBtn.addEventListener('click', navigateBack);
            backBtn.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    navigateBack();
                }
            });
        }

        function showModalLinkLoading(message = '正在跳转，请稍候...') {
            const overlay = document.getElementById('modalLinkLoadingOverlay');
            if (!overlay) return;
            const textElement = overlay.querySelector('.modal-link-loading-text');
            if (textElement) textElement.textContent = message;
            overlay.classList.add('show');
            overlay.setAttribute('aria-hidden', 'false');
        }

        function hideModalLinkLoading() {
            const overlay = document.getElementById('modalLinkLoadingOverlay');
            if (!overlay) return;
            overlay.classList.remove('show');
            overlay.setAttribute('aria-hidden', 'true');
        }

        function resetModalLink(link) {
            if (!link) return;
            const timerId = modalLinkTimers.get(link);
            if (timerId) {
                clearTimeout(timerId);
                modalLinkTimers.delete(link);
            }
            delete link.dataset.loading;
            link.classList.remove('modal-link-disabled');
            link.removeAttribute('aria-disabled');
        }

        function releaseModalLoadingState(modal) {
            if (!modal) return;
            delete modal.dataset.loading;
            modal.querySelectorAll('a[href]').forEach((anchor) => {
                resetModalLink(anchor);
            });
        }

        function markBattleCardLoading(card) {
            if (!card) return;
            const existingTimer = battleCardLoadingTimers.get(card);
            if (existingTimer) clearTimeout(existingTimer);
            card.dataset.loading = 'true';
            card.classList.add('battle-loading');
            card.style.pointerEvents = 'none';
            const timerId = setTimeout(() => {
                hideModalLinkLoading();
                releaseBattleCardLoading(card);
            }, 12000);
            battleCardLoadingTimers.set(card, timerId);
        }

        function releaseBattleCardLoading(card) {
            if (!card) return;
            const timerId = battleCardLoadingTimers.get(card);
            if (timerId) {
                clearTimeout(timerId);
                battleCardLoadingTimers.delete(card);
            }
            delete card.dataset.loading;
            card.classList.remove('battle-loading');
            card.style.removeProperty('pointer-events');
        }

        document.addEventListener('DOMContentLoaded', function() {
            setupBackButton();
            loadGameData(filename);
            checkFirstVisit();
            setupHeroStatsToggle();
        });

        function checkFirstVisit() {
            const hasSeen = localStorage.getItem('hasSeenUpdatesTip_20251121');
            if (!hasSeen || hasSeen < 1) setTimeout(showFeatureTip, 1000);
        }

        function showFeatureTip() {
            const modal = document.getElementById('featureTipModal');
            if (modal) {
                releaseModalLoadingState(modal);
                hideModalLinkLoading();
                modal.classList.add('show');
            }
        }

        function closeFeatureTip() {
            const modal = document.getElementById('featureTipModal');
            if (modal) {
                const hasSeen = localStorage.getItem('hasSeenUpdatesTip_20251121');
                releaseModalLoadingState(modal);
                hideModalLinkLoading();
                modal.classList.remove('show');
                localStorage.setItem('hasSeenUpdatesTip_20251121', Number(hasSeen) + 1);
            }
        }

        document.addEventListener('click', function(e) {
            const modal = document.getElementById('featureTipModal');
            if (e.target === modal) closeFeatureTip();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('featureTipModal');
                if (modal && modal.classList.contains('show')) closeFeatureTip();
            }
        });

        async function loadGameData(filepath) {
            try {
                const response = await fetch(filepath);
                if (!response.ok) throw new Error('HTTP错误: ' + response.status);
                const raw = await response.json();

                let data;
                if (Array.isArray(raw) || (raw && Array.isArray(raw.periods))) {
                    data = await adaptPeriodWithIcons(raw);
                } else {
                    data = raw;
                }

                analyzeData(data);
            } catch (error) {
                console.error('加载数据失败:', error);
                showError('加载数据失败: ' + error.message);
            }
        }

        async function adaptPeriodWithIcons(original) {
            const arr = Array.isArray(original) ? original : (original && Array.isArray(original.periods) ? original.periods : []);
            const result = { profile: null, btlist: { invisible: false, list: [] } };
            if (!Array.isArray(arr) || arr.length === 0) return result;

            // 加载英雄头像映射
            let heroIconMap = {};
            try {
                const resp = await fetch('allhero.json');
                if (resp.ok) {
                    const json = await resp.json();
                    const list = (json && json.data && Array.isArray(json.data.heroList)) ? json.data.heroList : [];
                    list.forEach(h => {
                        if (h.name && h.heroIcon) {
                            heroIconMap[String(h.name).trim()] = h.heroIcon;
                        }
                    });
                }
            } catch (e) {
                console.error('加载英雄头像失败:', e);
            }

            const first = arr[0];
            const nickname = first.nickname || '未知玩家';
            const roleId = first.roleid || first.id || '';
            const rankName = first.rank_name || first.rank || '';
            const rankStar = first.rank_star != null ? first.rank_star : first.star;

            let totalGames = 0;
            let wins = 0;
            let mvpCount = 0;
            let totalKills = 0;
            let totalDeaths = 0;
            let totalAssists = 0;
            let totalGrade = 0;
            let totalDuration = 0;
            let avatarIcon = '';
            const heroStatsMap = {};

            arr.forEach(day => {
                const details = Array.isArray(day.details) ? day.details : [];
                details.forEach(d => {
                    const resStr = (d.Result || '').toString();
                    const win = resStr.indexOf('胜') > -1 || resStr.toLowerCase().includes('win');
                    const kill = Number(d.KillCnt) || 0;
                    const dead = Number(d.DeadCnt) || 0;
                    const assist = Number(d.AssistCnt) || 0;
                    const grade = Number(d.GameGrade) || 0;
                    const duration = Number(d.Duration_Second) || 0;
                    const peakBefore = Number(d.PeakGradeBeforeGame);
                    const peakAfter = Number(d.PeakGradeAfterGame);
                    const params = d.Params || {};
                    const gameSvrId = params.gameSvrId || params.gameSvr || '';
                    const relaySvrId = params.relaySvrId || params.relaySvr || '';
                    const pvpType = params.pvptype || params.pvpType || 0;
                    const heroName = d.HeroName || '';
                    const heroIcon = heroIconMap[String(heroName).trim()] || '';

                    if (!avatarIcon && heroIcon) {
                        avatarIcon = heroIcon;
                    }

                    const heroKey = heroName || '未知';
                    if (!heroStatsMap[heroKey]) {
                        heroStatsMap[heroKey] = {
                            heroName: heroKey,
                            games: 0,
                            wins: 0,
                            kills: 0,
                            deaths: 0,
                            assists: 0,
                            gradeSum: 0,
                            durationSum: 0,
                            heroIcon: heroIcon
                        };
                    }
                    const hs = heroStatsMap[heroKey];
                    hs.games += 1;
                    if (win) hs.wins += 1;
                    hs.kills += kill;
                    hs.deaths += dead;
                    hs.assists += assist;
                    if (!isNaN(grade)) hs.gradeSum += grade;
                    if (!isNaN(duration)) hs.durationSum += duration;
                    if (!hs.heroIcon && heroIcon) hs.heroIcon = heroIcon;

                    const battle = {
                        gameresult: win ? 1 : 0,
                        killcnt: kill,
                        deadcnt: dead,
                        assistcnt: assist,
                        mvpcnt: 0,
                        losemvp: 0,
                        gradeGame: grade,
                        gametime: d.GameTime || '',
                        dtEventTime: d.GameTime_Timestamp || 0,
                        mapName: d.MapName || '',
                        usedTime: duration,
                        gameSeq: d.GameSeq || params.gameseq || '',
                        gameSvrId: gameSvrId,
                        relaySvrId: relaySvrId,
                        pvpType: pvpType,
                        gametype: peakAfter >= 0 ? 14 : 4,
                        oldMasterMatchScore: isNaN(peakBefore) ? 0 : peakBefore,
                        newMasterMatchScore: isNaN(peakAfter) ? 0 : peakAfter,
                        roleJobName: rankName,
                        stars: rankStar || 0,
                        rampage: 0,
                        godLikeCnt: 0,
                        firstBlood: 0,
                        hero1TripleKillCnt: 0,
                        hero1UltraKillCnt: 0,
                        hero1RampageCnt: 0,
                        heroName: heroName,
                        heroIcon: heroIcon
                    };

                    result.btlist.list.push(battle);
                    totalGames++;
                    if (win) wins++;
                    totalKills += kill;
                    totalDeaths += dead;
                    totalAssists += assist;
                    if (!isNaN(grade)) totalGrade += grade;
                    if (!isNaN(duration)) totalDuration += duration;
                });
            });

            const winRateStr = totalGames ? (wins / totalGames * 100).toFixed(1) + '%' : '0%';
            const losses = totalGames - wins;
            const avgGrade = totalGames ? (totalGrade / totalGames).toFixed(1) : '0.0';
            const avgDurationMin = totalGames ? (totalDuration / totalGames / 60).toFixed(1) : '0.0';
            const avgKda = totalGames ? (((totalKills + totalAssists) / Math.max(totalDeaths, 1)).toFixed(2)) : '0.00';

            const heroStatsArr = Object.values(heroStatsMap).map(h => {
                const avgKills = h.games ? (h.kills / h.games).toFixed(1) : '0.0';
                const avgDeaths = h.games ? (h.deaths / h.games).toFixed(1) : '0.0';
                const avgAssists = h.games ? (h.assists / h.games).toFixed(1) : '0.0';
                const avgGradeHero = h.games ? (h.gradeSum / h.games).toFixed(1) : '0.0';
                const avgKdaHero = h.games ? (((h.kills + h.assists) / Math.max(h.deaths, 1)).toFixed(2)) : '0.00';
                const winRateHero = h.games ? (h.wins / h.games * 100).toFixed(1) + '%' : '0%';
                return {
                    heroName: h.heroName,
                    games: h.games,
                    wins: h.wins,
                    winRate: winRateHero,
                    avgKda: avgKdaHero,
                    avgGrade: avgGradeHero,
                    avgKills,
                    avgDeaths,
                    avgAssists,
                    heroIcon: h.heroIcon
                };
            }).sort((a, b) => b.games - a.games);

            // 对战局列表按时间进行降序排序（GameTime_Timestamp，新对局在前）
            if (result.btlist && result.btlist.list) {
                result.btlist.list.sort((a, b) => (b.dtEventTime || 0) - (a.dtEventTime || 0));
            }

            result.profile = {
                targetRoleId: roleId,
                roleList: [{
                    roleId: roleId,
                    roleName: nickname,
                    roleJobName: rankName,
                    roleIcon: avatarIcon
                }],
                head: {
                    mods: [
                        { name: '总场次', content: String(totalGames) },
                        { name: '胜率', content: winRateStr },
                        { name: 'MVP', content: String(mvpCount) },
                        { name: '场均评分', content: avgGrade },
                        { name: '场均时长', content: avgDurationMin + '分' }
                    ]
                },
                periodStats: {
                    totalGames,
                    wins,
                    losses,
                    winRate: winRateStr,
                    totalKills,
                    totalDeaths,
                    totalAssists,
                    avgKda,
                    avgGrade,
                    avgDurationMin
                },
                heroStats: heroStatsArr
            };

            return result;
        }

        function showLoading() {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('playerSection').style.display = 'none';
            document.getElementById('hiddenMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('playerSection').style.display = 'none';
            document.getElementById('hiddenMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }

        function analyzeData(data) {
            try {
                hideLoading();
                if (!data) throw new Error('数据为空');
                if (data.btlist && data.btlist.invisible) {
                    showHiddenMessage(data.btlist.invisDes || '战绩已隐藏');
                    return;
                }
                document.getElementById('playerSection').style.display = 'block';
                if (data.profile) {
                    profileData = data.profile;
                    updatePlayerProfile(data.profile);
                    heroStats = Array.isArray(data.profile.heroStats) ? data.profile.heroStats : [];
                    renderHeroStats(heroStats);
                }
                if (data.btlist && data.btlist.list) {
                    allBattles = data.btlist.list;
                    renderMapFilterBar(allBattles);
                    analyzeBattles(allBattles, currentMapFilter);
                } else {
                    document.getElementById('battleItems').innerHTML = '<p>暂无比赛记录</p>';
                }
            } catch (error) {
                console.error('分析数据失败:', error);
                showError('数据分析失败: ' + error.message);
            }
        }

        function hideLoading() {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showHiddenMessage(message) {
            document.getElementById('playerSection').style.display = 'none';
            document.getElementById('hiddenMessage').style.display = 'block';
            document.getElementById('invisDes').textContent = message;
        }

        function setupHeroStatsToggle() {
            const toggle = document.getElementById('heroStatsToggle');
            const panel = document.getElementById('heroStatsPanel');
            if (!toggle || !panel) return;
            toggle.addEventListener('click', () => {
                const expanded = toggle.classList.toggle('expanded');
                panel.style.display = expanded ? 'block' : 'none';
            });
        }

        function updatePlayerProfile(profileData) {
            try {
                const targetRoleId = profileData.targetRoleId;
                const targetRole = profileData.roleList.find(role => role.roleId === targetRoleId) || profileData.roleList[0];
                if (!targetRole) return;
                const roleName = targetRole.roleName || '未知玩家';
                const roleJobName = targetRole.roleJobName || '无称号';
                const avatar = targetRole.roleIcon || '';

                document.getElementById('playerName').textContent = roleName;
                document.getElementById('playerTitle').textContent = roleJobName;

                const avatarElement = document.getElementById('playerAvatar');
                if (avatar) {
                    avatarElement.src = avatar;
                    avatarElement.style.display = 'block';
                } else {
                    avatarElement.style.display = 'none';
                }

                const statsContainer = document.getElementById('playerStats');
                if (statsContainer) {
                    if (profileData.periodStats) {
                        const s = profileData.periodStats;
                        statsContainer.innerHTML = `
                            <div class="player-stat">
                                <div class="stat-value">${s.totalGames}</div>
                                <div class="stat-label">总场次</div>
                            </div>
                            <div class="player-stat">
                                <div class="stat-value">${s.wins}/${s.losses}</div>
                                <div class="stat-label">胜场/败场</div>
                            </div>
                            <div class="player-stat">
                                <div class="stat-value">${s.winRate}</div>
                                <div class="stat-label">胜率</div>
                            </div>
                            <div class="player-stat">
                                <div class="stat-value">${s.avgKda}</div>
                                <div class="stat-label">场均KDA</div>
                            </div>
                            <div class="player-stat">
                                <div class="stat-value">${s.avgGrade}</div>
                                <div class="stat-label">场均评分</div>
                            </div>
                            <div class="player-stat">
                                <div class="stat-value">${s.avgDurationMin}</div>
                                <div class="stat-label">场均时长(分)</div>
                            </div>
                        `;
                    } else if (profileData.head && Array.isArray(profileData.head.mods)) {
                        statsContainer.innerHTML = profileData.head.mods.map(m => `
                            <div class="player-stat">
                                <div class="stat-value">${m.content || ''}</div>
                                <div class="stat-label">${m.name || ''}</div>
                            </div>
                        `).join('');
                    } else {
                        statsContainer.innerHTML = '';
                    }
                }
            } catch (error) {
                console.error('更新玩家资料失败:', error);
            }
        }

        function renderHeroStats(stats) {
            const section = document.getElementById('heroStatsSection');
            const tbody = document.getElementById('heroStatsBody');
            if (!section || !tbody) return;
            if (!stats || !stats.length) {
                section.style.display = 'none';
                tbody.innerHTML = '';
                return;
            }
            section.style.display = 'block';
            tbody.innerHTML = stats.map(s => `
                <tr>
                    <td>
                        <div class="hero-stats-hero-cell">
                            ${s.heroIcon ? `<img src="${s.heroIcon}" alt="${s.heroName}" onerror="this.style.display='none'">` : ''}
                            <span>${s.heroName}</span>
                        </div>
                    </td>
                    <td>${s.games}</td>
                    <td>${s.winRate}</td>
                    <td>${s.avgKda}</td>
                    <td>${s.avgGrade}</td>
                    <td>${s.avgKills}</td>
                    <td>${s.avgDeaths}</td>
                    <td>${s.avgAssists}</td>
                </tr>
            `).join('');
        }

        function renderMapFilterBar(battles) {
            const filterControlArea = document.getElementById('filterControlArea');
            const mapFilterBar = document.getElementById('mapFilterBar');
            const dateFilterBar = document.getElementById('dateFilterBar');
            const mapFilterToggle = document.getElementById('mapFilterToggle');
            const dateFilterToggle = document.getElementById('dateFilterToggle');
            const dateFilterLabel = document.getElementById('dateFilterLabel');
            const dateRangeControls = document.getElementById('dateRangeControls');
            const dateRangeStartInput = document.getElementById('dateRangeStart');
            const dateRangeEndInput = document.getElementById('dateRangeEnd');
            const dateRangeScale = document.getElementById('dateRangeScale');
            const dateRangeTrackFill = document.getElementById('dateRangeTrackFill');
            const dateRangeText = document.getElementById('dateRangeText');

            if (!battles || battles.length === 0) {
                filterControlArea.style.display = 'none';
                return;
            }

            // 地图筛选按钮
            const mapSet = new Set();
            battles.forEach(b => {
                if (b.mapName && b.mapName.trim()) mapSet.add(b.mapName.trim());
            });
            const mapList = Array.from(mapSet).sort();
            mapList.unshift('全部');
            mapFilterBar.innerHTML = '';
            mapList.forEach(mapName => {
                const btn = document.createElement('button');
                btn.className = 'map-filter-btn' + (mapName === currentMapFilter ? ' active' : '');
                btn.textContent = mapName;
                btn.onclick = function() {
                    currentMapFilter = mapName;
                    Array.from(mapFilterBar.children).forEach(child => child.classList.remove('active'));
                    btn.classList.add('active');
                    applyFilters();
                };
                mapFilterBar.appendChild(btn);
            });

            // 日期范围滑动条（按对局日期）
            if (dateFilterBar && dateRangeControls && dateRangeStartInput && dateRangeEndInput && dateRangeScale && dateRangeTrackFill) {
                const dateSet = new Set();
                battles.forEach(b => {
                    const label = getBattleDateLabel(b);
                    if (label) dateSet.add(label);
                });
                dateLabels = Array.from(dateSet).sort();
                dateLabelIndexMap = {};
                dateLabels.forEach((label, idx) => { dateLabelIndexMap[label] = idx; });

                if (dateLabels.length === 0) {
                    dateRangeControls.style.display = 'none';
                    if (dateFilterToggle) dateFilterToggle.style.display = 'none';
                } else if (dateLabels.length === 1) {
                    dateRangeControls.style.display = 'none';
                    if (dateFilterToggle) {
                        dateFilterToggle.style.display = 'inline-flex';
                        if (dateFilterLabel) dateFilterLabel.textContent = dateLabels[0];
                    }
                    dateRangeStartIndex = 0;
                    dateRangeEndIndex = 0;
                } else {
                    dateRangeControls.style.display = 'flex';
                    if (dateFilterToggle) dateFilterToggle.style.display = 'inline-flex';

                    const maxIndex = dateLabels.length - 1;
                    const segments = Math.max(1, maxIndex);
                    const sliderMax = segments * 100; // 每个日期区间 100 份，拖动更细腻

                    dateRangeStartIndex = 0;
                    dateRangeEndIndex = maxIndex;

                    dateRangeStartInput.min = '0';
                    dateRangeStartInput.max = String(sliderMax);
                    dateRangeEndInput.min = '0';
                    dateRangeEndInput.max = String(sliderMax);
                    dateRangeStartInput.value = '0';
                    dateRangeEndInput.value = String(sliderMax);

                    // 刻度
                    dateRangeScale.innerHTML = '';
                    const scaleCount = Math.min(dateLabels.length, 5);
                    for (let i = 0; i < scaleCount; i++) {
                        const idx = Math.round(i * maxIndex / (scaleCount - 1));
                        const span = document.createElement('span');
                        span.textContent = dateLabels[idx];
                        dateRangeScale.appendChild(span);
                    }

                    let lastChanged = null; // 'start' | 'end'

                    function updateDateRangeUI() {
                        let rawStart = parseInt(dateRangeStartInput.value) || 0;
                        let rawEnd = parseInt(dateRangeEndInput.value) || 0;

                        // 保证左手柄不在右侧
                        if (rawStart > rawEnd) {
                            if (lastChanged === 'start') {
                                rawEnd = rawStart;
                                dateRangeEndInput.value = String(rawEnd);
                            } else if (lastChanged === 'end') {
                                rawStart = rawEnd;
                                dateRangeStartInput.value = String(rawStart);
                            } else {
                                rawStart = rawEnd;
                                dateRangeStartInput.value = String(rawStart);
                            }
                        }

                        const percentStart = (rawStart / sliderMax) * 100;
                        const percentEnd = (rawEnd / sliderMax) * 100;
                        dateRangeTrackFill.style.left = percentStart + '%';
                        dateRangeTrackFill.style.width = (percentEnd - percentStart) + '%';

                        // 将当前拖动位置映射到离散日期索引（仅用于标签和筛选）
                        const startIndex = Math.round((rawStart / sliderMax) * maxIndex);
                        const endIndex = Math.round((rawEnd / sliderMax) * maxIndex);
                        const idxStart = Math.min(startIndex, endIndex);
                        const idxEnd = Math.max(startIndex, endIndex);
                        dateRangeStartIndex = idxStart;
                        dateRangeEndIndex = idxEnd;

                        if (dateLabels.length) {
                            const startLabel = dateLabels[idxStart];
                            const endLabel = dateLabels[idxEnd];
                            const text = (idxStart === 0 && idxEnd === maxIndex) ? '全部日期' : `${startLabel} ~ ${endLabel}`;
                            if (dateRangeText) dateRangeText.textContent = text;
                            if (dateFilterLabel) dateFilterLabel.textContent = text;
                        }
                    }

                    function snapToNearestDockAndFilter() {
                        if (!dateLabels.length) return;
                        // 计算最近的离散停靠点
                        const snappedStart = Math.round((dateRangeStartIndex / maxIndex) * sliderMax);
                        const snappedEnd = Math.round((dateRangeEndIndex / maxIndex) * sliderMax);
                        dateRangeStartInput.value = String(snappedStart);
                        dateRangeEndInput.value = String(snappedEnd);
                        updateDateRangeUI();
                        applyFilters();
                    }

                    dateRangeStartInput.oninput = function() {
                        lastChanged = 'start';
                        updateDateRangeUI();
                    };
                    dateRangeEndInput.oninput = function() {
                        lastChanged = 'end';
                        updateDateRangeUI();
                    };

                    // 仅在松手或数值最终变化时，吸附到最近日期并触发筛选
                    ['change', 'pointerup', 'mouseup', 'touchend'].forEach(evt => {
                        dateRangeStartInput.addEventListener(evt, snapToNearestDockAndFilter);
                        dateRangeEndInput.addEventListener(evt, snapToNearestDockAndFilter);
                    });

                    updateDateRangeUI();
                }
            }

            mapFilterToggle.onclick = function() {
                mapFilterToggle.classList.toggle('expanded');
                mapFilterBar.classList.toggle('expanded');
            };

            if (dateFilterToggle && dateFilterBar) {
                dateFilterToggle.onclick = function() {
                    const expanded = dateFilterToggle.classList.toggle('expanded');
                    if (expanded) {
                        dateFilterBar.classList.add('expanded');
                    } else {
                        dateFilterBar.classList.remove('expanded');
                    }
                };
            }

            filterControlArea.style.display = 'block';
        }

        function applyFilters() {
            analyzeBattles(allBattles, currentMapFilter);
        }

        function getBattleDateLabel(battle) {
            if (!battle.dtEventTime) return '';
            const d = new Date(battle.dtEventTime * 1000);
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${m}-${day}`;
        }

        function formatBattleTime(battle) {
            if (!battle.dtEventTime) return battle.gametime || '';
            const d = new Date(battle.dtEventTime * 1000);
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const h = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${m}-${day} ${h}:${min}`;
        }

        function analyzeBattles(battles, mapFilter = '全部') {
            try {
                let filteredBattles = battles;
                if (mapFilter && mapFilter !== '全部') {
                    filteredBattles = filteredBattles.filter(b => (b.mapName || '').trim() === mapFilter);
                }
                if (dateLabels && dateLabels.length > 1) {
                    const minIdx = Math.min(dateRangeStartIndex, dateRangeEndIndex);
                    const maxIdx = Math.max(dateRangeStartIndex, dateRangeEndIndex);
                    filteredBattles = filteredBattles.filter(b => {
                        const label = getBattleDateLabel(b);
                        const idx = dateLabelIndexMap[label];
                        if (typeof idx !== 'number') return false;
                        return idx >= minIdx && idx <= maxIdx;
                    });
                }

                const recentBattles = filteredBattles;
                const battleItemsContainer = document.getElementById('battleItems');
                battleItemsContainer.innerHTML = '';

                recentBattles.forEach((battle, index) => {
                    const battleItem = document.createElement('div');
                    const gameResult = parseInt(battle.gameresult) || 0;
                    const bgClass = gameResult === 1 ? 'win-bg' : 'lose-bg';
                    battleItem.className = `battle-item ${bgClass}`;
                    battleItem.style.cursor = 'pointer';
                    const killcnt = parseInt(battle.killcnt) || 0;
                    const deadcnt = parseInt(battle.deadcnt) || 0;
                    const assistcnt = parseInt(battle.assistcnt) || 0;
                    const mvpcnt = parseInt(battle.mvpcnt) || 0;
                    const losemvp = parseInt(battle.losemvp) || 0;
                    const gradeGame = parseFloat(battle.gradeGame) || 0;
                    const usedTime = battle.usedTime || 0;

                    const timeDisplay = formatBattleTime(battle);

                    const gameTimeText = usedTime > 0 ? `${Math.floor(usedTime / 60)}分${usedTime % 60}秒` : '';

                    battleItem.innerHTML = `
                        <img src="${battle.heroIcon || ''}" alt="英雄头像" class="hero-icon" onerror="this.style.display='none'">
                        <div class="battle-info">
                            <div class="battle-header">
                                <div class="battle-title">
                                    <strong style="font-size: 0.95rem; color: var(--dark-color);">${battle.mapName || '未知地图'}</strong>
                                </div>
                            </div>
                            <div class="battle-meta">
                                <div class="battle-time">
                                    <div>${timeDisplay}</div>
                                    ${gameTimeText ? `<div>${gameTimeText}</div>` : ''}
                                </div>
                            </div>
                            <div class="stats">
                                <div class="stat kda-stat">
                                    <span class="stat-value">${killcnt}/${deadcnt}/${assistcnt}</span>
                                </div>
                                <div class="stat grade-stat">
                                    <span class="stat-label">评分</span>
                                    <span class="stat-value">${gradeGame.toFixed(1)}</span>
                                </div>
                                ${(mvpcnt > 0 || losemvp > 0) ? `
                                <div class="battle-badges">
                                    <span class="mvp-badge">MVP</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                        <button class="analyze-btn" title="分析战局" data-battle-index="${index}">
                            <svg viewBox="0 0 24 24">
                                <path d="M16,11.78L20.24,4.45L21.97,5.45L16.74,14.5L10.23,10.75L5.46,19H22V21H2V3H4V17.54L9.5,8L16,11.78Z"/>
                            </svg>
                        </button>
                        <button class="share-btn" title="分享战局" data-battle-index="${index}">
                            <svg viewBox="0 0 24 24">
                                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
                            </svg>
                        </button>
                        <button class="favorite-btn" title="收藏战局" data-battle-index="${index}">
                            <svg viewBox="0 0 24 24" class="heart-outline">
                                <path d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5 2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.04L12,21.35Z"/>
                            </svg>
                            <svg viewBox="0 0 24 24" class="heart-filled" style="display: none;">
                                <path d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5 2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.04L12,21.35Z"/>
                            </svg>
                        </button>
                    `;

                    battleItem.addEventListener('click', function(e) {
                        if (e.target.closest('.favorite-btn') || e.target.closest('.share-btn') || e.target.closest('.analyze-btn')) return;
                        handleBattleCardClick(battle, profileData, this);
                    });

                    const favoriteBtn = battleItem.querySelector('.favorite-btn');
                    favoriteBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleFavorite(battle, profileData, this);
                    });

                    const shareBtn = battleItem.querySelector('.share-btn');
                    shareBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleShare(battle, profileData, this);
                    });

                    const analyzeBtn = battleItem.querySelector('.analyze-btn');
                    analyzeBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleAnalyze(battle, profileData, this);
                    });

                    battleItemsContainer.appendChild(battleItem);
                });

                if (recentBattles.length === 0) {
                    battleItemsContainer.innerHTML = '<p>该地图暂无比赛记录</p>';
                }
            } catch (error) {
                console.error('分析比赛数据失败:', error);
                document.getElementById('battleItems').innerHTML = '<p>比赛数据解析失败</p>';
            }
        }

        function handleBattleCardClick(battle, profileData, cardElement) {
            try {
                if (cardElement) {
                    if (cardElement.dataset.loading === 'true') return;
                    const loadingText = cardElement.getAttribute('data-loading-text') || '获取数据中...';
                    showModalLinkLoading(loadingText);
                    markBattleCardLoading(cardElement);
                } else {
                    showModalLinkLoading();
                }

                if (!profileData) throw new Error('缺少玩家资料');

                const gameSvr = battle.gameSvrId || '';
                const gameSeq = battle.gameSeq || '';
                const targetRoleId = profileData.targetRoleId || '';
                const relaySvr = battle.relaySvrId || '';
                const battleType = parseInt(battle.pvpType) || 0;

                const params = new URLSearchParams({
                    gameSvr: gameSvr,
                    gameSeq: gameSeq,
                    targetRoleId: targetRoleId,
                    relaySvr: relaySvr,
                    battleType: battleType,
                    key: '{{key}}'
                });

                const targetUrl = `/jump-btldetail?${params.toString()}`;
                const newTab = window.open(targetUrl, '_blank');

                if (!newTab) {
                    hideModalLinkLoading();
                    if (cardElement) releaseBattleCardLoading(cardElement);
                    alert('弹窗被浏览器阻止，请允许打开新窗口查看详情');
                    return;
                }

                setTimeout(() => {
                    hideModalLinkLoading();
                    if (cardElement) releaseBattleCardLoading(cardElement);
                }, 1200);
            } catch (error) {
                console.error('跳转战斗详情失败:', error);
                hideModalLinkLoading();
                if (cardElement) releaseBattleCardLoading(cardElement);
                alert('跳转失败，请稍后重试');
            }
        }

        async function handleFavorite(battle, profileData, buttonElement) {
            try {
                buttonElement.classList.add('loading');
                const outlineIcon = buttonElement.querySelector('.heart-outline');
                const filledIcon = buttonElement.querySelector('.heart-filled');
                const gameSeq = battle.gameSeq || '';
                const params = new URLSearchParams({ gameSeq: gameSeq, key: '{{key}}' });
                const response = await fetch(`/like-btldetail?${params.toString()}`, { method: 'GET' });
                if (response.ok) {
                    const result = await response.json();
                    buttonElement.classList.remove('loading');
                    buttonElement.classList.add('favorited');
                    if (outlineIcon) outlineIcon.style.display = 'none';
                    if (filledIcon) filledIcon.style.display = 'block';
                    buttonElement.title = '已收藏';
                    showToast(result.message || '收藏成功！', 'success');
                } else {
                    let errorMessage = '收藏失败，请稍后重试';
                    try {
                        const errorData = await response.json();
                        if (errorData.message) errorMessage = errorData.message;
                        else if (errorData.detail && errorData.detail.message) errorMessage = errorData.detail.message;
                    } catch (e) {
                        errorMessage = `收藏失败: ${response.status} ${response.statusText}`;
                    }
                    buttonElement.classList.remove('loading');
                    if (outlineIcon) outlineIcon.style.display = 'block';
                    if (filledIcon) filledIcon.style.display = 'none';
                    showToast(errorMessage, 'error');
                    return;
                }
            } catch (error) {
                console.error('收藏战局失败:', error);
                buttonElement.classList.remove('loading');
                const outlineIcon = buttonElement.querySelector('.heart-outline');
                const filledIcon = buttonElement.querySelector('.heart-filled');
                if (outlineIcon) outlineIcon.style.display = 'block';
                if (filledIcon) filledIcon.style.display = 'none';
                showToast(error.message || '收藏失败，请稍后重试', 'error');
            }
        }

        let lastShareTime = 0;
        const SHARE_COOLDOWN = 10000;
        let lastAnalyzeTime = 0;
        const ANALYZE_COOLDOWN = 10000;

        function checkBtlOfficialWithMatchingWithEntertain(btlname) {
            btlname = String(btlname || '').toLowerCase();
            if (['1v1', '2v2', '3v3'].some(pattern => btlname.includes(pattern))) return false;
            return ['排位', '巅峰', '战队', '王者峡谷', '梦境'].some(pattern => btlname.includes(pattern));
        }

        async function handleShare(battle, profileData, buttonElement) {
            try {
                const currentTime = Date.now();
                const timeSinceLastShare = currentTime - lastShareTime;
                if (timeSinceLastShare < SHARE_COOLDOWN) {
                    const remainingSeconds = Math.ceil((SHARE_COOLDOWN - timeSinceLastShare) / 1000);
                    showToast(`请等待 ${remainingSeconds} 秒后再分享`, 'warning');
                    return;
                }
                if (!checkBtlOfficialWithMatchingWithEntertain(battle.mapName)) {
                    showToast('仅支持分享排位/巅峰/战队/匹配/梦境', 'warning');
                    return;
                }

                const confirmed = await showShareConfirm();
                if (!confirmed) return;
                lastShareTime = currentTime;

                buttonElement.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    buttonElement.style.transform = 'scale(1)';
                }, 150);

                const gameSvr = battle.gameSvrId || '';
                const gameSeq = battle.gameSeq || '';
                const targetRoleId = profileData && profileData.targetRoleId || '';
                const relaySvr = battle.relaySvrId || '';
                const battleType = parseInt(battle.pvpType) || 0;

                const params = new URLSearchParams({
                    gameSvr,
                    gameSeq,
                    targetRoleId,
                    relaySvr,
                    battleType,
                    key: '{{key}}'
                });

                const response = await fetch(`/share-btldetail?${params.toString()}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    const resultText = await response.text();
                    showToast('分享成功，等待片刻后消息会发出', 'success');
                    if (navigator.clipboard && resultText.includes('http')) {
                        try {
                            const urlMatch = resultText.match(/https?:\/\/[^\s]+/);
                            if (urlMatch) {
                                await navigator.clipboard.writeText(urlMatch[0]);
                                showToast('分享链接已复制到剪贴板', 'success');
                            }
                        } catch (clipboardError) {
                            console.error('复制到剪贴板失败:', clipboardError);
                        }
                    }
                } else {
                    let errorMessage = '分享失败，请稍后重试';
                    try {
                        const errorText = await response.text();
                        console.error('分享失败响应:', errorText);
                        if (errorText.includes('not logged in') || errorText.includes('未登录')) {
                            errorMessage = '请先登录';
                        }
                    } catch (e) {
                        errorMessage = `分享失败: ${response.status} ${response.statusText}`;
                    }
                    showToast(errorMessage, 'error');
                }
            } catch (error) {
                console.error('分享战局失败:', error);
                showToast(error.message || '分享失败，请稍后重试', 'error');
            }
        }

        async function handleAnalyze(battle, profileData, buttonElement) {
            try {
                const currentTime = Date.now();
                const timeSinceLastAnalyze = currentTime - lastAnalyzeTime;
                if (timeSinceLastAnalyze < ANALYZE_COOLDOWN) {
                    const remainingSeconds = Math.ceil((ANALYZE_COOLDOWN - timeSinceLastAnalyze) / 1000);
                    showToast(`请等待 ${remainingSeconds} 秒后再分析`, 'warning');
                    return;
                }
                if (!checkBtlOfficialWithMatchingWithEntertain(battle.mapName)) {
                    showToast('仅支持分析排位/巅峰/战队/匹配/梦境', 'warning');
                    return;
                }

                const confirmed = await showAnalyzeConfirm();
                if (!confirmed) return;
                lastAnalyzeTime = currentTime;

                buttonElement.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    buttonElement.style.transform = 'scale(1)';
                }, 150);
                buttonElement.classList.add('loading');

                const gameSvr = battle.gameSvrId || '';
                const gameSeq = battle.gameSeq || '';
                const targetRoleId = profileData && profileData.targetRoleId || '';
                const relaySvr = battle.relaySvrId || '';
                const battleType = parseInt(battle.pvpType) || 0;

                const params = new URLSearchParams({
                    gameSvr,
                    gameSeq,
                    targetRoleId,
                    relaySvr,
                    battleType,
                    key: '{{key}}'
                });

                const response = await fetch(`/analyze-btldetail?${params.toString()}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                buttonElement.classList.remove('loading');

                if (response.ok) {
                    await response.text();
                    showToast('分析请求已发送，请稍候查看结果', 'success');
                } else {
                    let errorMessage = '分析失败，请稍后重试';
                    try {
                        const errorText = await response.text();
                        console.error('分析失败响应:', errorText);
                        if (errorText.includes('not logged in') || errorText.includes('未登录')) {
                            errorMessage = '请先登录';
                        }
                    } catch (e) {
                        errorMessage = `分析失败: ${response.status} ${response.statusText}`;
                    }
                    showToast(errorMessage, 'error');
                }
            } catch (error) {
                console.error('分析战局失败:', error);
                buttonElement.classList.remove('loading');
                showToast(error.message || '分析失败，请稍后重试', 'error');
            }
        }

        function showShareConfirm() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0, 0, 0, 0.6);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 10001;
                    backdrop-filter: blur(5px);
                `;

                const box = document.createElement('div');
                box.style.cssText = `
                    background: rgba(255, 255, 255, 0.95);
                    backdrop-filter: blur(20px);
                    border: 1px solid rgba(255, 255, 255, 0.3);
                    border-radius: 20px;
                    padding: 0;
                    max-width: 400px;
                    width: 90%;
                    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
                    transform: scale(0.7);
                    transition: all 0.3s ease;
                `;

                box.innerHTML = `
                    <div style="padding: 25px 25px 15px; text-align: center; border-bottom: 1px solid rgba(108, 155, 209, 0.2);">
                        <div style="font-size: 2.5rem; margin-bottom: 10px;">💬</div>
                        <h3 style="margin: 0; color: var(--dark-color); font-size: 1.3rem; font-weight: 600;">分享确认</h3>
                    </div>
                    <div style="padding: 20px 25px; text-align: center;">
                        <p style="color: var(--dark-color); font-size: 1.1rem; line-height: 1.5; margin: 0 0 20px;">
                            点击确认后会将该战局分享到群聊
                        </p>
                        <div style="display: flex; gap: 12px; justify-content: center;">
                            <button id="cancelShare" style="
                                background: rgba(108, 117, 125, 0.1);
                                color: var(--accent-color);
                                border: 1px solid rgba(108, 117, 125, 0.3);
                                padding: 10px 20px;
                                border-radius: 20px;
                                font-size: 1rem;
                                cursor: pointer;
                                transition: all 0.3s ease;
                                min-width: 80px;
                            ">取消</button>
                            <button id="confirmShare" style="
                                background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
                                color: white;
                                border: none;
                                padding: 10px 20px;
                                border-radius: 20px;
                                font-size: 1rem;
                                cursor: pointer;
                                transition: all 0.3s ease;
                                box-shadow: 0 4px 15px rgba(108, 155, 209, 0.3);
                                min-width: 80px;
                            ">确定</button>
                        </div>
                    </div>
                `;

                overlay.appendChild(box);
                document.body.appendChild(overlay);
                setTimeout(() => { box.style.transform = 'scale(1)'; }, 50);

                const cancelBtn = box.querySelector('#cancelShare');
                const confirmBtn = box.querySelector('#confirmShare');

                const close = (result) => {
                    overlay.style.opacity = '0';
                    box.style.transform = 'scale(0.7)';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        resolve(result);
                    }, 300);
                };

                cancelBtn.addEventListener('click', () => close(false));
                confirmBtn.addEventListener('click', () => close(true));

                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) close(false);
                });

                const escHandler = (e) => {
                    if (e.key === 'Escape') {
                        document.removeEventListener('keydown', escHandler);
                        close(false);
                    }
                };
                document.addEventListener('keydown', escHandler);
            });
        }

        function showAnalyzeConfirm() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0, 0, 0, 0.6);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 10001;
                    backdrop-filter: blur(5px);
                `;

                const box = document.createElement('div');
                box.style.cssText = `
                    background: rgba(255, 255, 255, 0.95);
                    backdrop-filter: blur(20px);
                    border: 1px solid rgba(255, 255, 255, 0.3);
                    border-radius: 20px;
                    padding: 0;
                    max-width: 400px;
                    width: 90%;
                    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
                    transform: scale(0.7);
                    transition: all 0.3s ease;
                `;

                box.innerHTML = `
                    <div style="padding: 25px 25px 15px; text-align: center; border-bottom: 1px solid rgba(108, 155, 209, 0.2);">
                        <div style="font-size: 2.5rem; margin-bottom: 10px;">📊</div>
                        <h3 style="margin: 0; color: var(--dark-color); font-size: 1.3rem; font-weight: 600;">分析确认</h3>
                    </div>
                    <div style="padding: 20px 25px; text-align: center;">
                        <p style="color: var(--dark-color); font-size: 1.1rem; line-height: 1.5; margin: 0 0 20px;">
                            点击确认后会分析该战局的底蕴并发送到群聊
                        </p>
                        <div style="display: flex; gap: 12px; justify-content: center;">
                            <button id="cancelAnalyze" style="
                                background: rgba(108, 117, 125, 0.1);
                                color: var(--accent-color);
                                border: 1px solid rgba(108, 117, 125, 0.3);
                                padding: 10px 20px;
                                border-radius: 20px;
                                font-size: 1rem;
                                cursor: pointer;
                                transition: all 0.3s ease;
                                min-width: 80px;
                            ">取消</button>
                            <button id="confirmAnalyze" style="
                                background: linear-gradient(135deg, #9c27b0, #ab47bc);
                                color: white;
                                border: none;
                                padding: 10px 20px;
                                border-radius: 20px;
                                font-size: 1rem;
                                cursor: pointer;
                                transition: all 0.3s ease;
                                box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3);
                                min-width: 80px;
                            ">确定</button>
                        </div>
                    </div>
                `;

                overlay.appendChild(box);
                document.body.appendChild(overlay);
                setTimeout(() => { box.style.transform = 'scale(1)'; }, 50);

                const cancelBtn = box.querySelector('#cancelAnalyze');
                const confirmBtn = box.querySelector('#confirmAnalyze');

                const close = (result) => {
                    overlay.style.opacity = '0';
                    box.style.transform = 'scale(0.7)';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        resolve(result);
                    }, 300);
                };

                cancelBtn.addEventListener('click', () => close(false));
                confirmBtn.addEventListener('click', () => close(true));

                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) close(false);
                });

                const escHandler = (e) => {
                    if (e.key === 'Escape') {
                        document.removeEventListener('keydown', escHandler);
                        close(false);
                    }
                };
                document.addEventListener('keydown', escHandler);
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                z-index: 10000;
                opacity: 0;
                transform: translateX(100%);
                transition: all 0.3s ease;
                max-width: 300px;
                word-wrap: break-word;
            `;
            if (type === 'success') toast.style.background = 'linear-gradient(135deg, #28a745, #20c997)';
            else if (type === 'error') toast.style.background = 'linear-gradient(135deg, #dc3545, #e74c3c)';
            else if (type === 'warning') toast.style.background = 'linear-gradient(135deg, #ffc107, #ff9800)';
            else toast.style.background = 'linear-gradient(135deg, #6c9bd1, #4fc3f7)';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(0)';
            }, 100);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }
    </script>
    <script src="animation_overlay.js"></script>

</body>
