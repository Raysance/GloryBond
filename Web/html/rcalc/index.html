<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>底蕴计算器</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="container">
    <h1>底蕴计算器</h1>
  </header>

  <main class="container">
    <section class="toolbar">
      <button id="randomBoth" class="btn primary">随机填充两侧</button>
      <button id="resetBoth" class="btn">重置为默认</button>
    </section>

    <section class="grid">
      <div class="card" id="playerA">
        <h2>玩家 A</h2>
        <form class="form" autocomplete="off">
          <div class="group">
            <label>总局数</label>
            <input type="number" name="TotalCnt" min="0" max="20000" step="1" />
            <div class="mobile-only"><input type="range" data-for="TotalCnt" min="0" max="20000" step="1" /></div>
          </div>
          <div class="group">
            <label>MVP 次数</label>
            <input type="number" name="MVPCnt" min="0" max="20000" step="1" />
            <div class="mobile-only"><input type="range" data-for="MVPCnt" min="0" max="20000" step="1" /></div>
          </div>

          <div class="group two">
            <div>
              <label>该英雄胜场</label>
              <input type="number" name="winNum" min="0" max="1000" step="1" />
              <div class="mobile-only"><input type="range" data-for="winNum" min="0" max="1000" step="1" /></div>
            </div>
            <div>
              <label>该英雄败场</label>
              <input type="number" name="loseNum" min="0" max="1000" step="1" />
              <div class="mobile-only"><input type="range" data-for="loseNum" min="0" max="1000" step="1" /></div>
            </div>
          </div>
          <div class="group">
            <label>该英雄出场局数</label>
            <input type="number" name="HeroShowCnt" readonly />
          </div>

          <div class="group">
            <label>是否授权营地</label>
            <select name="is_auth">
              <option value="true">已授权</option>
              <option value="false">未授权（折扣 0.6）</option>
            </select>
          </div>

          <div class="group two">
            <div>
              <label>星数(王者=50星)</label>
              <input type="number" name="starNum" min="40" max="150" step="1" />
              <div class="mobile-only"><input type="range" data-for="starNum" min="40" max="150" step="1" /></div>
            </div>
            <div>
              <label>巅峰分</label>
              <input type="number" name="peakScore" min="600" max="2500" step="1" />
              <div class="mobile-only"><input type="range" data-for="peakScore" min="600" max="2500" step="1" /></div>
            </div>
          </div>
          <div class="hint">等价星级 = （星数 - 25） + （巅峰分 - 1200） / 15，下界为 1</div>

          <div class="group">
            <label>战斗力</label>
            <input type="number" name="PowerNum" min="0" max="200000" step="100" />
            <div class="mobile-only"><input type="range" data-for="PowerNum" min="0" max="200000" step="100" /></div>
          </div>

          <div class="group two">
            <div>
                <label>该英雄当前战力</label>
                <input type="number" name="heroPower" min="0" max="20000" step="10" />
                <div class="mobile-only"><input type="range" data-for="heroPower" min="0" max="20000" step="10" /></div>
            </div>
            <div>
              <label>该英雄平均评分</label>
              <input type="number" name="avgScore" min="2" max="16" step="0.1" />
              <div class="mobile-only"><input type="range" data-for="avgScore" min="2" max="16" step="0.1" /></div>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="btn" data-action="random">随机填充</button>
            <button type="button" class="btn" data-action="calc">计算</button>
          </div>
        </form>

        <div class="result">
          <div class="score" data-field="single_level">--</div>
          <div class="details">
            <div class="row"><span>MVP 率</span><span data-field="MVPRate">--</span></div>
            <div class="row"><span>等价星级</span><span data-field="equiv_star">--</span></div>
            <div class="row"><span>授权系数</span><span data-field="auth_coeff">--</span></div>
          </div>
        </div>
      </div>

    </section>
    <br><br>
    <section>
      <div class="compare-row">
        <div class="label">底蕴对比</div>
        <div class="bars">
          <div class="bar" id="barA"><span>A</span></div>
          <div class="bar" id="barB"><span>B</span></div>
        </div>
        <div class="delta" id="delta"></div>
      </div>
    </section>

    <section class="compare card">
      <h2>附：底蕴计算公式</h2>
      <div class="note" id="formula-katex"></div>
      <br>
      <details class="refs">
        <summary>1.5倍底蕴等价条件（左右滑动查看）</summary>
        <div class="ref-scroll">
        <div class="ref-grid">
          <div class="k">段位</div>
          <div class="v">王者 0 星</div>
          <div class="arrow">→</div>
          <div class="v">王者 50 星</div>

          <div class="k">巅峰分</div>
          <div class="v">1,200</div>
          <div class="arrow">→</div>
          <div class="v">1,600</div>

          <div class="k">MVP 率</div>
          <div class="v">30%</div>
          <div class="arrow">→</div>
          <div class="v">56%</div>

          <div class="k">总战斗力</div>
          <div class="v">50,000</div>
          <div class="arrow">→</div>
          <div class="v">80,000</div>

          <div class="k">该英雄平均评分</div>
          <div class="v">8</div>
          <div class="arrow">→</div>
          <div class="v">12</div>

          <div class="k">该英雄总场次</div>
          <div class="v">10</div>
          <div class="arrow">→</div>
          <div class="v">300</div>

          <div class="k">该英雄战力</div>
          <div class="v">1,000</div>
          <div class="arrow">→</div>
          <div class="v">13,000 <span class="hint-sm">(中间 6,000)</span></div>
        </div>
        </div>
      </details>
    </section>
  </main>

  <footer class="container footnote">
  </footer>

  <script src="assets/latex.js"></script>
  <script>
    (function(){
      const el = document.getElementById('formula-katex');
      const formula = String.raw`\text{s} = \text{等价星级}^{0.3} \cdot \left(\frac{1}{1 + e^{-\text{MVP率}}}\right)^{4} \cdot \left(\frac{\text{战斗力}}{10000}\right)^{0.85} \cdot \text{平均评分} \cdot \left(\frac{1}{1 + e^{-\left(\frac{\text{出场局数}}{10}\right)}}\right)^{1.3} \cdot \left(\frac{1}{1 + e^{-\left(\frac{\text{英雄当前战力}}{10000}\right)}}\right)^{2} \cdot \text{授权系数}`;
      if (window.LiteLaTeX && el) {
        window.LiteLaTeX.renderInline(el, formula);
      } else if (el) {
        el.textContent = formula;
      }
    })();
  </script>
  <script src="assets/app2.js"></script>
  <!-- 移动端固定显示 A/B 底蕴分 -->
  <div id="floatingScores" class="floating-scores mobile-only-fixed" aria-hidden="true">
    <div class="item a"><span class="label">A</span><span class="value">--</span></div>
    <div class="item b"><span class="label">B</span><span class="value">--</span></div>
  </div>
</body>
</html>
